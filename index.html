<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saurabh Pharmacy & Clinic</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{height:100vh;background:linear-gradient(135deg,#0f766e,#115e59);}

/* LOGIN */
#loginPage{height:100vh;display:flex;flex-direction:column;}
.top-bar{height:60px;background:rgba(0,0,0,0.25);display:flex;align-items:center;justify-content:space-between;padding:0 30px;color:#fff;}
.main-container{flex:1;display:flex;align-items:center;justify-content:center;}
.login-card{width:400px;background:rgba(255,255,255,0.12);backdrop-filter:blur(15px);border-radius:15px;padding:40px;color:#fff;}
.input-group{margin-bottom:15px;}
.input-group input{width:100%;padding:10px;margin-top:5px;border-radius:8px;border:none;}
.login-btn{width:100%;padding:12px;background:#22c55e;border:none;border-radius:8px;color:#fff;cursor:pointer;}
.login-btn:hover{background:#16a34a;}

/* DASHBOARD */
#dashboard{display:none;height:100vh;display:flex;}
.sidebar{width:230px;background:#0f3f3d;color:#fff;padding-top:20px;}
.sidebar h3{text-align:center;margin-bottom:20px;}
.menu-item{padding:15px 20px;cursor:pointer;}
.menu-item:hover{background:#115e59;}
.main-content{flex:1;background:#e6f4f1;padding:20px;}
.header{height:60px;background:#115e59;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-radius:8px;margin-bottom:20px;}
.card{background:#fff;padding:20px;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,0.1);}

/* PATIENT TABLE */
table{width:100%;border-collapse:collapse;margin-top:15px;}
th,td{padding:10px;border-bottom:1px solid #ddd;text-align:left;font-size:14px;}
th{background:#f0fdfa;}
.add-btn{background:#22c55e;color:#fff;padding:8px 15px;border:none;border-radius:6px;cursor:pointer;}
.add-btn:hover{background:#16a34a;}
.action-btn{background:#0f766e;color:#fff;padding:5px 10px;border:none;border-radius:5px;font-size:12px;cursor:pointer;}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-top:15px;}
.form-grid input,select{padding:8px;border:1px solid #ccc;border-radius:6px;width:100%;}
.form-actions{margin-top:15px;}
.save-btn{background:#22c55e;color:#fff;padding:10px 20px;border:none;border-radius:6px;cursor:pointer;}
.cancel-btn{background:#ccc;padding:10px 20px;border:none;border-radius:6px;cursor:pointer;margin-left:10px;}
.hidden{display:none;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
<div class="top-bar">
<div>Saurabh Pharmacy & Clinic</div>
<div>System Active</div>
</div>

<div class="main-container">
<div class="login-card">
<h2>ADMIN LOGIN</h2>
<div class="input-group">
<label>Username</label>
<input type="text" id="username">
</div>
<div class="input-group">
<label>Password</label>
<input type="password" id="password">
</div>
<button class="login-btn" onclick="login()">LOGIN</button>
</div>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
<div class="sidebar">
<h3>Admin Panel</h3>
<div class="menu-item" onclick="loadPage('dashboard')">Overall Dashboard</div>
<div class="menu-item" onclick="loadPage('patients')">Patient Center</div>
</div>

<div class="main-content">
<div class="header">
<div>Admin Dashboard</div>
<div>Welcome Admin</div>
</div>

<div id="contentArea" class="card">
Dashboard Overview
</div>
</div>
</div>

<script>
let patients=[];
let uidCounter=1;

function login(){
let u=document.getElementById("username").value;
let p=document.getElementById("password").value;
if(u==="admin" && p==="1234"){
document.getElementById("loginPage").style.display="none";
document.getElementById("dashboard").style.display="flex";
}else{alert("Invalid Login");}
}

function loadPage(page){
let content=document.getElementById("contentArea");

if(page==="dashboard"){
content.innerHTML="Dashboard Overview";
}

if(page==="patients"){
content.innerHTML=`
<h2>Patient Management</h2>
<button class="add-btn" onclick="showForm()">+ Add New Patient Registration</button>

<div id="patientForm" class="hidden">
<h3>New Patient Registration</h3>
<div class="form-grid">
<input type="text" id="pFirst" placeholder="First Name">
<input type="text" id="pLast" placeholder="Last Name">
<input type="text" id="pPhone" placeholder="Phone">
<input type="text" id="pEmail" placeholder="Email">
<select id="pRelation">
<option value="S/O">Son Of</option>
<option value="D/O">Daughter Of</option>
<option value="W/O">Wife Of</option>
</select>
<input type="text" id="pGuardian" placeholder="Guardian Name">
<select id="pGender">
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
<input type="text" id="pAddress" placeholder="Address">
</div>
<div class="form-actions">
<button class="save-btn" onclick="savePatient()">Save Patient Profile</button>
<button class="cancel-btn" onclick="hideForm()">Cancel</button>
</div>
</div>

<table>
<thead>
<tr>
<th>UID</th>
<th>Patient Name</th>
<th>Relation</th>
<th>Contact</th>
<th>Address</th>
<th>Gender</th>
<th>Action</th>
</tr>
</thead>
<tbody id="patientTable"></tbody>
</table>
`;
renderTable();
}
}

function showForm(){
document.getElementById("patientForm").classList.remove("hidden");
}

function hideForm(){
document.getElementById("patientForm").classList.add("hidden");
}

function savePatient(){
let patient={
uid:("0000"+uidCounter).slice(-4),
name:document.getElementById("pFirst").value+" "+document.getElementById("pLast").value,
relation:document.getElementById("pRelation").value+" "+document.getElementById("pGuardian").value,
phone:document.getElementById("pPhone").value,
address:document.getElementById("pAddress").value,
gender:document.getElementById("pGender").value
};
patients.push(patient);
uidCounter++;
hideForm();
renderTable();
}

function renderTable(){
let table=document.getElementById("patientTable");
if(!table)return;
table.innerHTML="";
patients.forEach(p=>{
table.innerHTML+=`
<tr>
<td>${p.uid}</td>
<td>${p.name}</td>
<td>${p.relation}</td>
<td>${p.phone}</td>
<td>${p.address}</td>
<td>${p.gender}</td>
<td><button class="action-btn">Edit</button></td>
</tr>
`;
});
}
</script>

</body>
</html>
