<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saurabh Pharmacy & Clinic</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{height:100vh;background:linear-gradient(135deg,#0f766e,#115e59);}

/* LOGIN */
#loginPage{height:100vh;display:flex;flex-direction:column;}
.top-bar{height:60px;background:rgba(0,0,0,0.25);display:flex;align-items:center;justify-content:space-between;padding:0 30px;color:#fff;}
.main-container{flex:1;display:flex;align-items:center;justify-content:center;}
.login-card{width:400px;background:rgba(255,255,255,0.12);backdrop-filter:blur(15px);border-radius:15px;padding:40px;color:#fff;}
.input-group{margin-bottom:15px;}
.input-group input{width:100%;padding:10px;margin-top:5px;border-radius:8px;border:none;}
.login-btn{width:100%;padding:12px;background:#22c55e;border:none;border-radius:8px;color:#fff;cursor:pointer;}
.login-btn:hover{background:#16a34a;}

/* DASHBOARD */
#dashboard{display:none;height:100vh;display:flex;}
.sidebar{width:230px;background:#0f3f3d;color:#fff;padding-top:20px;}
.sidebar h3{text-align:center;margin-bottom:20px;}
.menu-item{padding:15px 20px;cursor:pointer;}
.menu-item:hover{background:#115e59;}
.main-content{flex:1;background:#e6f4f1;padding:20px;}
.header{height:60px;background:#115e59;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-radius:8px;margin-bottom:20px;}
.card{background:#fff;padding:20px;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,0.1);}

table{width:100%;border-collapse:collapse;margin-top:15px;}
th,td{padding:10px;border-bottom:1px solid #ddd;font-size:14px;}
th{background:#f0fdfa;}
button{cursor:pointer;}

.btn-green{background:#22c55e;color:#fff;border:none;padding:8px 15px;border-radius:6px;}
.btn-green:hover{background:#16a34a;}
.btn-blue{background:#0f766e;color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:12px;}
.btn-gray{background:#ccc;border:none;padding:6px 12px;border-radius:6px;font-size:12px;}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-top:15px;}
.form-grid input,textarea{padding:8px;border:1px solid #ccc;border-radius:6px;width:100%;}
.hidden{display:none;}
.profile-box{background:#f9fafb;padding:15px;border-radius:8px;margin-bottom:15px;}
.visit-box{background:#f1f5f9;padding:10px;border-radius:6px;margin-bottom:8px;font-size:13px;}
</style>
</head>
<body>

<div id="loginPage">
<div class="top-bar">
<div>Saurabh Pharmacy & Clinic</div>
<div>System Active</div>
</div>
<div class="main-container">
<div class="login-card">
<h2>ADMIN LOGIN</h2>
<div class="input-group">
<label>Username</label>
<input type="text" id="username">
</div>
<div class="input-group">
<label>Password</label>
<input type="password" id="password">
</div>
<button class="login-btn" onclick="login()">LOGIN</button>
</div>
</div>
</div>

<div id="dashboard">
<div class="sidebar">
<h3>Admin Panel</h3>
<div class="menu-item" onclick="loadPage('dashboard')">Overall Dashboard</div>
<div class="menu-item" onclick="loadPage('patients')">Patient Center</div>
</div>

<div class="main-content">
<div class="header">
<div>Admin Dashboard</div>
<div>Welcome Admin</div>
</div>
<div id="contentArea" class="card"></div>
</div>
</div>

<script>
let patients=[];
let uidCounter=1;
let currentPatient=null;

function login(){
let u=document.getElementById("username").value;
let p=document.getElementById("password").value;
if(u==="admin" && p==="1234"){
document.getElementById("loginPage").style.display="none";
document.getElementById("dashboard").style.display="flex";
loadPage('patients');
}else{alert("Invalid Login");}
}

function loadPage(page){
if(page==="dashboard"){
document.getElementById("contentArea").innerHTML="Dashboard Overview";
}
if(page==="patients"){
renderPatientList();
}
}

function renderPatientList(){
let content=document.getElementById("contentArea");
content.innerHTML=`
<h2>Patient Management</h2>
<button class="btn-green" onclick="showAddForm()">+ Add New Patient</button>
<div id="addForm" class="hidden">
<div class="form-grid">
<input id="fname" placeholder="First Name">
<input id="lname" placeholder="Last Name">
<input id="phone" placeholder="Phone">
<input id="relation" placeholder="Relation (S/O, D/O, W/O)">
<input id="guardian" placeholder="Guardian Name">
<input id="address" placeholder="Address">
<input id="gender" placeholder="Gender">
</div>
<br>
<button class="btn-green" onclick="savePatient()">Save</button>
<button class="btn-gray" onclick="renderPatientList()">Cancel</button>
</div>
<table>
<thead>
<tr>
<th>UID</th>
<th>Name</th>
<th>Relation</th>
<th>Phone</th>
<th>Gender</th>
<th>Action</th>
</tr>
</thead>
<tbody>
${patients.map(p=>`
<tr>
<td><b style="color:#0f766e;cursor:pointer" onclick="openProfile('${p.uid}')">${p.uid}</b></td>
<td>${p.name}</td>
<td>${p.relation}</td>
<td>${p.phone}</td>
<td>${p.gender}</td>
<td><button class="btn-blue" onclick="openProfile('${p.uid}')">View</button></td>
</tr>`).join("")}
</tbody>
</table>
`;
}

function showAddForm(){
document.getElementById("addForm").classList.remove("hidden");
}

function savePatient(){
let patient={
uid:("0000"+uidCounter).slice(-4),
name:fname.value+" "+lname.value,
relation:relation.value+" "+guardian.value,
phone:phone.value,
address:address.value,
gender:gender.value,
visits:[]
};
patients.push(patient);
uidCounter++;
renderPatientList();
}

function openProfile(uid){
currentPatient=patients.find(p=>p.uid===uid);
let content=document.getElementById("contentArea");
content.innerHTML=`
<button class="btn-gray" onclick="renderPatientList()">← Back</button>
<h2>Patient Profile (${currentPatient.uid})</h2>
<div class="profile-box">
<b>Name:</b> ${currentPatient.name}<br>
<b>Relation:</b> ${currentPatient.relation}<br>
<b>Phone:</b> ${currentPatient.phone}<br>
<b>Address:</b> ${currentPatient.address}<br>
<b>Gender:</b> ${currentPatient.gender}
</div>

<h3>Add Medical Record</h3>
<textarea id="diagnosis" placeholder="Diagnosis"></textarea><br><br>
<textarea id="advice" placeholder="Advice"></textarea><br><br>
<button class="btn-green" onclick="addVisit()">Save Visit</button>

<h3 style="margin-top:20px;">Visit History</h3>
${currentPatient.visits.length===0?"No previous visits":
currentPatient.visits.map(v=>`
<div class="visit-box">
<b>Date:</b> ${v.date}<br>
<b>Diagnosis:</b> ${v.diagnosis}<br>
<b>Advice:</b> ${v.advice}
</div>`).join("")}
`;
}

function addVisit(){
let visit={
date:new Date().toLocaleDateString(),
diagnosis:diagnosis.value,
advice:advice.value
};
currentPatient.visits.push(visit);
openProfile(currentPatient.uid);
}
</script>

</body>
</html>
