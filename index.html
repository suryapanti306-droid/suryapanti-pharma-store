<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Suryapanti Pharma Store</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      width: 320px;
      text-align: center;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #2c7be5;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #1a68d1;
    }
    #dashboard {
      display: none;
      text-align: center;
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="card" id="loginBox">
  <h2>Admin Login</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <p id="error" style="color:red;"></p>
</div>

<!-- DASHBOARD -->
<div class="card" id="dashboard">
  <h2>Welcome Admin ✅</h2>
  <p>Firebase Connected & Login Successful</p>
  <button onclick="logout()">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyDpV_nRiRt2cToNGaFW1bi55hsb-7p6Ig8",
  authDomain: "suryapanti-pharma-store.firebaseapp.com",
  projectId: "suryapanti-pharma-store",
  storageBucket: "suryapanti-pharma-store.firebasestorage.app",
  messagingSenderId: "960716528234",
  appId: "1:960716528234:web:0d1968b04794a49bbb8813",
  measurementId: "G-NX1T0GSDW1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// LOGIN FUNCTION
window.login = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      document.getElementById("error").innerText = "";
    })
    .catch((error) => {
      document.getElementById("error").innerText = "Invalid Email or Password";
    });
};

// LOGOUT
window.logout = function () {
  signOut(auth);
};

// AUTO LOGIN CHECK
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
  } else {
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("dashboard").style.display = "none";
  }
});

</script>

</body>
</html>
