<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{
      font-family: Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:#f4f6f9;
    }
    .box{
      background:white;
      padding:30px;
      border-radius:10px;
      width:300px;
      text-align:center;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }
    input{
      width:100%;
      padding:8px;
      margin:8px 0;
    }
    button{
      width:100%;
      padding:8px;
      background:green;
      color:white;
      border:none;
      cursor:pointer;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Admin Login</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDpV_nRiRt2cToNGaFW1bi55hsb-7p6Ig8",
  authDomain: "suryapanti-pharma-store.firebaseapp.com",
  projectId: "suryapanti-pharma-store",
  storageBucket: "suryapanti-pharma-store.firebasestorage.app",
  messagingSenderId: "960716528234",
  appId: "1:960716528234:web:0d1968b04794a49bbb8813"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
  .then(()=>{
    window.location.href = "dashboard.html";
  })
  .catch(err=>alert(err.message));
};

onAuthStateChanged(auth, (user)=>{
  if(user){
    window.location.href="dashboard.html";
  }
});

</script>
</body>
</html>
