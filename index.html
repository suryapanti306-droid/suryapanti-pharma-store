<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suryapanti Pharma Store</title>

<!-- Tailwind CDN for professional theme -->
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white;}
body::before {
  content: '';
  position: fixed;
  top:0; left:0; width:100%; height:100%;
  background: url('https://i.ibb.co/3pS8C2X/medical-bg.png') center/cover no-repeat;
  opacity:0.05;
  z-index: -1;
}
.sidebar-btn:hover {background:#1e293b;}
.table-header {background:#1e293b;}
.page {display:none;}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="flex items-center justify-center h-screen bg-gradient-to-tr from-slate-800 to-slate-900">
  <div class="bg-slate-700 p-8 rounded-lg shadow-lg w-80">
    <h2 class="text-2xl font-bold mb-4 text-center">Login</h2>
    <input id="user" type="text" placeholder="Username" class="w-full p-2 rounded mb-2 text-black">
    <input id="pass" type="password" placeholder="Password" class="w-full p-2 rounded mb-4 text-black">
    <button onclick="login()" class="w-full p-2 bg-blue-600 rounded hover:bg-blue-800">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden flex min-h-screen">

  <!-- Sidebar -->
  <div class="w-56 bg-slate-800 p-4 flex flex-col">
    <h2 class="text-center text-xl font-bold mb-6">Pharma Store</h2>
    <button onclick="showPage('home')" class="sidebar-btn p-2 mb-2 rounded">Dashboard</button>
    <button onclick="showPage('medicine')" class="sidebar-btn p-2 mb-2 rounded">Medicines</button>
    <button onclick="showPage('customer')" class="sidebar-btn p-2 mb-2 rounded">Customers</button>
    <button onclick="showPage('billing')" class="sidebar-btn p-2 mb-2 rounded">Billing</button>
    <button onclick="showPage('settings')" class="sidebar-btn p-2 mb-2 rounded">Settings</button>
    <button onclick="logout()" class="sidebar-btn p-2 mb-2 rounded bg-red-600 hover:bg-red-800">Logout</button>
  </div>

  <!-- Content -->
  <div class="flex-1 p-6 space-y-6 overflow-auto">

    <!-- Home Page -->
    <div id="home" class="page">
      <div class="bg-slate-700 p-4 rounded-lg shadow text-center">
        <h2 class="text-2xl font-bold mb-4">Welcome <span id="pharmaNameHome">Suryapanti</span></h2>
        <p>Total Medicines: <span id="totalMed">0</span></p>
        <p>Total Customers: <span id="totalCust">0</span></p>
        <p>Total Profit: ₹ <span id="totalProfit">0</span></p>
      </div>
    </div>

    <!-- Medicines Page -->
    <div id="medicine" class="page space-y-4">
      <div class="bg-slate-700 p-4 rounded-lg shadow">
        <h2 class="text-xl font-bold mb-2">Add Medicine</h2>
        <input id="mName" type="text" placeholder="Medicine Name" class="w-full p-2 rounded mb-2 text-black">
        <input id="mBuy" type="number" placeholder="Buy Price" class="w-full p-2 rounded mb-2 text-black">
        <input id="mSell" type="number" placeholder="Sell Price" class="w-full p-2 rounded mb-2 text-black">
        <input id="mQty" type="number" placeholder="Quantity" class="w-full p-2 rounded mb-2 text-black">
        <button onclick="addMedicine()" class="w-full p-2 bg-blue-600 rounded hover:bg-blue-800">Add Medicine</button>
      </div>
      <div class="bg-slate-700 p-4 rounded-lg shadow overflow-auto">
        <h2 class="text-xl font-bold mb-2">Medicine List</h2>
        <table class="w-full text-center">
          <thead class="table-header">
            <tr>
              <th class="p-2">Name</th><th class="p-2">Buy</th><th class="p-2">Sell</th><th class="p-2">Qty</th>
            </tr>
          </thead>
          <tbody id="medTable"></tbody>
        </table>
      </div>
    </div>

    <!-- Customers Page -->
    <div id="customer" class="page space-y-4">
      <div class="bg-slate-700 p-4 rounded-lg shadow">
        <h2 class="text-xl font-bold mb-2">Add Customer</h2>
        <input id="cName" type="text" placeholder="Customer Name" class="w-full p-2 rounded mb-2 text-black">
        <input id="cPhone" type="text" placeholder="Phone" class="w-full p-2 rounded mb-2 text-black">
        <input id="cAddress" type="text" placeholder="Address" class="w-full p-2 rounded mb-2 text-black">
        <input id="cDOB" type="date" placeholder="DOB" class="w-full p-2 rounded mb-2 text-black">
        <input id="cReferred" type="text" placeholder="Referred By" class="w-full p-2 rounded mb-2 text-black">
        <button onclick="addCustomer()" class="w-full p-2 bg-blue-600 rounded hover:bg-blue-800">Add Customer</button>
      </div>
      <div class="bg-slate-700 p-4 rounded-lg shadow overflow-auto">
        <h2 class="text-xl font-bold mb-2">Customer List</h2>
        <table class="w-full text-center">
          <thead class="table-header">
            <tr>
              <th class="p-2">Name</th><th class="p-2">Phone</th><th class="p-2">Address</th><th class="p-2">DOB</th><th class="p-2">Referred By</th>
            </tr>
          </thead>
          <tbody id="custTable"></tbody>
        </table>
      </div>
    </div>

    <!-- Billing Page -->
    <div id="billing" class="page space-y-4">
      <div class="bg-slate-700 p-4 rounded-lg shadow">
        <h2 class="text-xl font-bold mb-2">Billing</h2>
        <select id="billCustomer" class="w-full p-2 rounded mb-2 text-black"></select>
        <select id="billMedicine" class="w-full p-2 rounded mb-2 text-black"></select>
        <input id="billQty" type="number" placeholder="Quantity" class="w-full p-2 rounded mb-2 text-black">
        <input id="billDiscount" type="number" placeholder="Discount %" class="w-full p-2 rounded mb-2 text-black">
        <button onclick="generateBill()" class="w-full p-2 bg-blue-600 rounded hover:bg-blue-800">Generate Bill</button>
        <button onclick="printBill()" class="w-full p-2 bg-green-600 rounded hover:bg-green-800 mt-2">Print Bill</button>
        <p class="mt-2">Profit: ₹ <span id="billProfit">0</span></p>
        <p>Pharmacist: <span id="pharmaName">Saurabh Ray</span></p>
      </div>
    </div>

    <!-- Settings Page -->
    <div id="settings" class="page space-y-4">
      <div class="bg-slate-700 p-4 rounded-lg shadow">
        <h2 class="text-xl font-bold mb-2">Store & Admin Settings</h2>
        <input id="setStoreName" type="text" placeholder="Store Name" class="w-full p-2 rounded mb-2 text-black" value="Suryapanti Pharma Store">
        <input id="setPharmaName" type="text" placeholder="Pharmacist Name" class="w-full p-2 rounded mb-2 text-black" value="Saurabh Ray">
        <input id="setPhone" type="text" placeholder="Phone" class="w-full p-2 rounded mb-2 text-black" value="+91-XXXXXXXXXX">
        <input id="setEmail" type="text" placeholder="Email" class="w-full p-2 rounded mb-2 text-black" value="suryapanti306@gmail.com">
        <input id="setAddress" type="text" placeholder="Address" class="w-full p-2 rounded mb-2 text-black" value="Store Address Here">
        <button onclick="saveSettings()" class="w-full p-2 bg-blue-600 rounded hover:bg-blue-800">Save Settings</button>
      </div>
    </div>

  </div>
</div>

<script>
// ----- Data -----
let medicines = JSON.parse(localStorage.getItem("medicines"))||[];
let customers = JSON.parse(localStorage.getItem("customers"))||[];
let settings = JSON.parse(localStorage.getItem("settings"))||{
  storeName:"Suryapanti Pharma Store",
  pharmaName:"Saurabh Ray",
  phone:"+91-XXXXXXXXXX",
  email:"suryapanti306@gmail.com",
  address:"Store Address Here",
  username:"suryapanti760",
  password:"12345678"
};
let totalProfit = 0;

// ----- LOGIN -----
function login(){
  if(user.value===settings.username && pass.value===settings.password){
    loginPage.style.display="none";
    dashboard.style.display="flex";
    loadData();
  } else { alert("Wrong Login"); }
}

function logout(){ location.reload(); }

// ----- Page Switch -----
function showPage(page){
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById(page).style.display="block";
}

// ----- Medicines -----
function addMedicine(){
  medicines.push({
    name:mName.value,
    buy:Number(mBuy.value),
    sell:Number(mSell.value),
    qty:Number(mQty.value)
  });
  localStorage.setItem("medicines",JSON.stringify(medicines));
  loadData();
}

// ----- Customers -----
function addCustomer(){
  customers.push({
    name:cName.value,
    phone:cPhone.value,
    address:cAddress.value,
    dob:cDOB.value,
    referred:cReferred.value
  });
  localStorage.setItem("customers",JSON.stringify(customers));
  loadData();
}

// ----- Load Data -----
function loadData(){
  totalMed.innerText = medicines.length;
  totalCust.innerText = customers.length;
  pharmaNameHome.innerText = settings.pharmaName;

  // Medicines table
  medTable.innerHTML="";
  medicines.forEach(m=>{
    medTable.innerHTML+=`<tr><td>${m.name}</td><td>${m.buy}</td><td>${m.sell}</td><td>${m.qty}</td></tr>`;
  });

  // Customers table
  custTable.innerHTML="";
  customers.forEach(c=>{
    custTable.innerHTML+=`<tr><td>${c.name}</td><td>${c.phone}</td><td>${c.address}</td><td>${c.dob}</td><td>${c.referred}</td></tr>`;
  });

  // Billing selects
  billCustomer.innerHTML="<option value=''>Select Customer</option>";
  customers.forEach((c,i)=>{
    billCustomer.innerHTML+=`<option value='${i}'>${c.name}</option>`;
  });
  billMedicine.innerHTML="<option value=''>Select Medicine</option>";
  medicines.forEach((m,i)=>{
    billMedicine.innerHTML+=`<option value='${i}'>${m.name}</option>`;
  });
}

// ----- Billing -----
function generateBill(){
  let custIndex=billCustomer.value;
  let medIndex=billMedicine.value;
  let qty=billQty.value;
  let discount=billDiscount.value||0;

  if(custIndex==="" || medIndex===""){ alert("Select Customer & Medicine"); return; }

  let med=medicines[medIndex];
  let customer=customers[custIndex];

  let total=med.sell*qty;
  let discountAmount=total*(discount/100);
  let profit=(med.sell-med.buy)*qty-discountAmount;
  totalProfit+=profit;
  billProfit.innerText=profit.toFixed(2);

  alert(`Bill Generated for ${customer.name}\nMedicine: ${med.name}\nQty: ${qty}\nDiscount: ${discount}%\nProfit: ₹${profit.toFixed(2)}`);
}

// ----- Print Bill -----
function printBill(){
  let custIndex=billCustomer.value;
  let medIndex=billMedicine.value;
  let qty=billQty.value;
  let discount=billDiscount.value||0;
  if(custIndex==="" || medIndex===""){ alert("Select Customer & Medicine"); return; }

  let med=medicines[medIndex];
  let customer=customers[custIndex];

  let total=med.sell*qty;
  let discountAmount=total*(discount/100);
  let profit=(med.sell-med.buy)*qty-discountAmount;

  let billContent=`<pre>
${settings.storeName}
Pharmacist: ${settings.pharmaName}
Phone: ${settings.phone}
Email: ${settings.email}
Address: ${settings.address}
-------------------------------------
Customer: ${customer.name}  Phone: ${customer.phone}
Address: ${customer.address}  DOB: ${customer.dob}
Referred By: ${customer.referred}
-------------------------------------
Medicine Name  Qty  Price/Unit  Discount%  Total  Profit
${med.name}         ${qty}    ${med.sell}       ${discount}        ${(med.sell*qty-discountAmount).toFixed(2)}   ${profit.toFixed(2)}
-------------------------------------
Total Amount: ₹${(med.sell*qty-discountAmount).toFixed(2)}
Profit: ₹${profit.toFixed(2)}
Discount Applied: ${discount}%
Digitally Signed by ${settings.pharmaName}
</pre>`;

  let w = window.open();
  w.document.write(billContent);
  w.print();
  w.close();
}

// ----- Settings -----
function saveSettings(){
  settings.storeName = setStoreName.value;
  settings.pharmaName = setPharmaName.value;
  settings.phone = setPhone.value;
  settings.email = setEmail.value;
  settings.address = setAddress.value;

  localStorage.setItem("settings",JSON.stringify(settings));
  alert("Settings saved!");
  loadData();
}

</script>

</body>
</html>
