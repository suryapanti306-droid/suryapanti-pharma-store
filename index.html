<!DOCTYPE html>
<html>
<head>
  <title>Suryapanti Pharma - Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
    }

    .container {
      display: flex;
    }

    .sidebar {
      width: 220px;
      background: #0f3d3e;
      color: white;
      height: 100vh;
      padding: 20px;
      position: fixed;
    }

    .sidebar h2 {
      margin-bottom: 30px;
      font-size: 18px;
    }

    .sidebar a {
      display: block;
      color: white;
      text-decoration: none;
      margin: 15px 0;
      cursor: pointer;
    }

    .main {
      margin-left: 240px;
      padding: 20px;
      width: 100%;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn {
      padding: 8px 12px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: white;
    }

    th, td {
      padding: 10px;
      border: 1px solid #ddd;
      text-align: center;
    }

    th {
      background: #198754;
      color: white;
    }

    input, select {
      padding: 6px;
      margin: 5px;
    }

    .form-box {
      background: white;
      padding: 15px;
      margin-top: 20px;
      border-radius: 8px;
    }

    .logout {
      background: red;
    }
  </style>
</head>

<body>

<div class="container">
  
  <div class="sidebar">
    <h2>Pharma Panel</h2>
    <a>Overall Dashboard</a>
    <a>Book Appointments</a>
    <a><b>Patient Center</b></a>
    <a>Medication Inventory</a>
    <a>Retail Sales</a>
    <a>Analytics Reports</a>
    <a>System Settings</a>
  </div>

  <div class="main">
    
    <div class="header">
      <h2>Patient Management</h2>
      <button class="btn logout" onclick="logout()">Logout</button>
    </div>

    <div class="form-box">
      <h3>Add New Patient</h3>
      <input type="text" id="name" placeholder="Patient Name">
      <input type="text" id="relation" placeholder="Relation (S/O, D/O)">
      <input type="text" id="contact" placeholder="Contact">
      <input type="text" id="address" placeholder="Address">
      <select id="gender">
        <option>Male</option>
        <option>Female</option>
      </select>
      <button class="btn" onclick="addPatient()">Add Patient</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>UID</th>
          <th>Date</th>
          <th>Time</th>
          <th>Name</th>
          <th>Relation</th>
          <th>Contact</th>
          <th>Address</th>
          <th>Gender</th>
        </tr>
      </thead>
      <tbody id="patientTable"></tbody>
    </table>

  </div>
</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDpV_nRiRt2cToNGaFW1bi55hsb-7p6Ig8",
  authDomain: "suryapanti-pharma-store.firebaseapp.com",
  projectId: "suryapanti-pharma-store",
  storageBucket: "suryapanti-pharma-store.firebasestorage.app",
  messagingSenderId: "960716528234",
  appId: "1:960716528234:web:0d1968b04794a49bbb8813",
  measurementId: "G-NX1T0GSDW1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// Protect Page
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "index.html";
  }
});

// Logout
window.logout = function() {
  signOut(auth).then(() => {
    window.location.href = "index.html";
  });
}

// Generate UID
async function generateUID() {
  const snapshot = await getDocs(collection(db, "patients"));
  const count = snapshot.size + 1;
  return count.toString().padStart(4, "0");
}

// Add Patient
window.addPatient = async function () {

  const uid = await generateUID();
  const now = new Date();

  await addDoc(collection(db, "patients"), {
    uid: uid,
    name: document.getElementById("name").value,
    relation: document.getElementById("relation").value,
    contact: document.getElementById("contact").value,
    address: document.getElementById("address").value,
    gender: document.getElementById("gender").value,
    createdDate: now.toLocaleDateString(),
    createdTime: now.toLocaleTimeString(),
    timestamp: now
  });

  alert("Patient Added Successfully ✅");
}

// Real-time Table
const q = query(collection(db, "patients"), orderBy("timestamp", "desc"));

onSnapshot(q, (snapshot) => {
  const table = document.getElementById("patientTable");
  table.innerHTML = "";

  snapshot.forEach((doc) => {
    const data = doc.data();
    table.innerHTML += `
      <tr>
        <td>${data.uid}</td>
        <td>${data.createdDate}</td>
        <td>${data.createdTime}</td>
        <td>${data.name}</td>
        <td>${data.relation}</td>
        <td>${data.contact}</td>
        <td>${data.address}</td>
        <td>${data.gender}</td>
      </tr>
    `;
  });
});

</script>

</body>
</html>
