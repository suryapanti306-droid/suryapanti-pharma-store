<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saurabh Pharmacy & Clinic</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    background: linear-gradient(135deg,#0f766e,#115e59);
    display:flex;
    flex-direction:column;
}

/* Top Header */
.top-bar{
    height:60px;
    background:rgba(0,0,0,0.25);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 30px;
    color:#fff;
    font-size:14px;
}

.top-bar .right{
    display:flex;
    gap:20px;
}

/* Center Container */
.main-container{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* Glass Card */
.login-card{
    width:400px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(15px);
    border-radius:15px;
    padding:40px 30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    color:#fff;
}

.login-card h2{
    text-align:center;
    margin-bottom:25px;
    font-weight:600;
}

.input-group{
    margin-bottom:15px;
}

.input-group label{
    font-size:13px;
}

.input-group input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:8px;
    border:none;
    outline:none;
}

.login-btn{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#22c55e;
    border:none;
    border-radius:8px;
    color:#fff;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.login-btn:hover{
    background:#16a34a;
}

.forgot{
    text-align:center;
    margin-top:15px;
    font-size:13px;
    cursor:pointer;
}

.logo-title{
    text-align:center;
    margin-bottom:10px;
    font-size:18px;
    font-weight:600;
}

</style>
</head>

<body>

<div class="top-bar">
    <div>Saurabh Pharmacy & Clinic</div>
    <div class="right">
        <div>System Status: Active</div>
        <div>Support</div>
    </div>
</div>

<div class="main-container">

    <div class="login-card">

        <div class="logo-title">
            ADMIN PORTAL LOGIN
        </div>

        <div class="input-group">
            <label>Admin Username / Email</label>
            <input type="text" id="username">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password">
        </div>

        <div class="input-group">
            <label>Enter OTP (Optional)</label>
            <input type="text" id="otp">
        </div>

        <button class="login-btn" onclick="login()">SECURE LOGIN</button>

        <div class="forgot">Forgot Password?</div>

    </div>

</div>

<script>
function login(){
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(user === "admin" && pass === "1234"){
        alert("Login Successful");
    }else{
        alert("Invalid Credentials");
    }
}
</script>

</body>
</html>
