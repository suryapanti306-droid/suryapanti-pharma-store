<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suryapanti Pharma Store</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0f172a;
color:white;
}

.login-page{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#1e293b,#0f172a);
}

.login-box{
background:#1e293b;
padding:30px;
border-radius:10px;
width:300px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#3b82f6;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

.dashboard{
display:none;
}

.sidebar{
width:220px;
background:#1e293b;
height:100vh;
position:fixed;
padding-top:20px;
}

.sidebar h2{
text-align:center;
}

.sidebar button{
width:90%;
margin:10px;
background:#334155;
}

.content{
margin-left:220px;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #334155;
padding:8px;
text-align:center;
}

@media(max-width:768px){
.sidebar{
position:relative;
width:100%;
height:auto;
}
.content{
margin-left:0;
}
}
</style>
</head>

<body>

<!-- LOGIN PAGE -->
<div class="login-page" id="loginPage">
<div class="login-box">
<h2>Login</h2>
<input type="text" id="user" placeholder="Username">
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

<div class="sidebar">
<h2>Pharma</h2>
<button onclick="showPage('home')">Dashboard</button>
<button onclick="showPage('medicine')">Medicines</button>
<button onclick="showPage('customer')">Customers</button>
<button onclick="showPage('billing')">Billing</button>
<button onclick="logout()">Logout</button>
</div>

<div class="content">

<div id="home" class="page">
<div class="card">
<h3>Welcome Suryapanti</h3>
<p>Total Medicines: <span id="totalMed"></span></p>
<p>Total Customers: <span id="totalCust"></span></p>
<p>Total Profit: ₹ <span id="totalProfit"></span></p>
</div>
</div>

<div id="medicine" class="page" style="display:none">
<div class="card">
<h3>Add Medicine</h3>
<input type="text" id="mName" placeholder="Medicine Name">
<input type="number" id="mBuy" placeholder="Buy Price">
<input type="number" id="mSell" placeholder="Sell Price">
<input type="number" id="mQty" placeholder="Quantity">
<button onclick="addMedicine()">Add</button>
</div>

<div class="card">
<h3>Medicine List</h3>
<table id="medTable">
<tr><th>Name</th><th>Buy</th><th>Sell</th><th>Qty</th></tr>
</table>
</div>
</div>

<div id="customer" class="page" style="display:none">
<div class="card">
<h3>Add Customer</h3>
<input type="text" id="cName" placeholder="Customer Name">
<input type="text" id="cPhone" placeholder="Phone">
<button onclick="addCustomer()">Add</button>
</div>

<div class="card">
<h3>Customer List</h3>
<table id="custTable">
<tr><th>Name</th><th>Phone</th></tr>
</table>
</div>
</div>

<div id="billing" class="page" style="display:none">
<div class="card">
<h3>Billing</h3>
<input type="number" id="billBuy" placeholder="Buy Price">
<input type="number" id="billSell" placeholder="Sell Price">
<button onclick="calculateProfit()">Calculate Profit</button>
<p>Profit: ₹ <span id="billProfit"></span></p>
</div>
</div>

</div>
</div>

<script>
let medicines=JSON.parse(localStorage.getItem("medicines"))||[];
let customers=JSON.parse(localStorage.getItem("customers"))||[];
let totalProfit=0;

function login(){
if(user.value==="suryapanti760" && pass.value==="12345678"){
loginPage.style.display="none";
dashboard.style.display="block";
loadData();
}else{
alert("Wrong Login");
}
}

function logout(){
location.reload();
}

function showPage(page){
document.querySelectorAll(".page").forEach(p=>p.style.display="none");
document.getElementById(page).style.display="block";
}

function addMedicine(){
medicines.push({
name:mName.value,
buy:Number(mBuy.value),
sell:Number(mSell.value),
qty:Number(mQty.value)
});
localStorage.setItem("medicines",JSON.stringify(medicines));
loadData();
}

function addCustomer(){
customers.push({
name:cName.value,
phone:cPhone.value
});
localStorage.setItem("customers",JSON.stringify(customers));
loadData();
}

function calculateProfit(){
let buy=Number(billBuy.value);
let sell=Number(billSell.value);
let profit=sell-buy;
totalProfit+=profit;
billProfit.innerText=profit;
document.getElementById("totalProfit").innerText=totalProfit;
}

function loadData(){
totalMed.innerText=medicines.length;
totalCust.innerText=customers.length;

let medTable=document.getElementById("medTable");
medTable.innerHTML="<tr><th>Name</th><th>Buy</th><th>Sell</th><th>Qty</th></tr>";
medicines.forEach(m=>{
medTable.innerHTML+=`<tr><td>${m.name}</td><td>${m.buy}</td><td>${m.sell}</td><td>${m.qty}</td></tr>`;
});

let custTable=document.getElementById("custTable");
custTable.innerHTML="<tr><th>Name</th><th>Phone</th></tr>";
customers.forEach(c=>{
custTable.innerHTML+=`<tr><td>${c.name}</td><td>${c.phone}</td></tr>`;
});
}
</script>

</body>
</html>
