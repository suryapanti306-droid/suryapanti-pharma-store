<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{margin:0;font-family:Arial;background:#f4f6f9;}
    .sidebar{
      width:220px;
      background:#0f3d3e;
      color:white;
      height:100vh;
      position:fixed;
      padding:20px;
    }
    .sidebar a{display:block;color:white;margin:15px 0;text-decoration:none;}
    .main{margin-left:240px;padding:20px;}
    input,select{padding:6px;margin:5px;}
    button{padding:6px 10px;background:green;color:white;border:none;cursor:pointer;}
    table{width:100%;margin-top:20px;border-collapse:collapse;background:white;}
    th,td{padding:8px;border:1px solid #ddd;text-align:center;}
    th{background:#198754;color:white;}
  </style>
</head>
<body>

<div class="sidebar">
  <h3>Pharma Panel</h3>
  <a><b>Patient Center</b></a>
  <a>Inventory</a>
  <a>Sales</a>
  <a>Reports</a>
  <button onclick="logout()" style="background:red;margin-top:20px;">Logout</button>
</div>

<div class="main">
  <h2>Patient Management</h2>

  <div>
    <input id="name" placeholder="Patient Name">
    
    <select id="relationType">
      <option value="S/O">S/O</option>
      <option value="D/O">D/O</option>
      <option value="W/O">W/O</option>
      <option value="C/O">C/O</option>
      <option value="H/O">H/O</option>
    </select>

    <input id="relationName" placeholder="Related Person Name">
    <input id="contact" placeholder="Contact">
    <input id="address" placeholder="Address">

    <select id="gender">
      <option>Male</option>
      <option>Female</option>
      <option>Child</option>
    </select>

    <button onclick="addPatient()">Add Patient</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>UID</th>
        <th>Date</th>
        <th>Time</th>
        <th>Name</th>
        <th>Relation</th>
        <th>Contact</th>
        <th>Address</th>
        <th>Gender</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDpV_nRiRt2cToNGaFW1bi55hsb-7p6Ig8",
  authDomain: "suryapanti-pharma-store.firebaseapp.com",
  projectId: "suryapanti-pharma-store",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

window.logout=function(){
  signOut(auth).then(()=>{
    window.location.href="index.html";
  });
};

async function generateUID(){
  const snap=await getDocs(collection(db,"patients"));
  return (snap.size+1).toString().padStart(4,"0");
}

window.addPatient=async function(){
  <h2>Patient List</h2>

<table border="1" width="100%">
<thead>
<tr>
<th>Name</th>
<th>Age</th>
</tr>
</thead>

<tbody id="patientList"></tbody>
</table>

  const now=new Date();
  const uid=await generateUID();

  const relationFull =
    document.getElementById("relationType").value + " " +
    document.getElementById("relationName").value;

  await addDoc(collection(db,"patients"),{
    uid,
    name:document.getElementById("name").value,
    relation:relationFull,
    contact:document.getElementById("contact").value,
    address:document.getElementById("address").value,
    gender:document.getElementById("gender").value,
    createdDate:now.toLocaleDateString(),
    createdTime:now.toLocaleTimeString(),
    timestamp:now
  });

  alert("Patient Added ✅");
};

const q=query(collection(db,"patients"),orderBy("timestamp","desc"));

onSnapshot(q,(snap)=>{
  const table=document.getElementById("table");
  table.innerHTML="";
  snap.forEach(doc=>{
    const d=doc.data();
    table.innerHTML+=`
    <tr>
      <td>${d.uid}</td>
      <td>${d.createdDate}</td>
      <td>${d.createdTime}</td>
      <td>${d.name}</td>
      <td>${d.relation}</td>
      <td>${d.contact}</td>
      <td>${d.address}</td>
      <td>${d.gender}</td>
    </tr>`;
  });
});

</script>
</body>
</html>
