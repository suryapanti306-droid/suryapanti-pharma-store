<!DOCTYPE html>
<html>
<head>
<title>Pharma Dashboard</title>

<style>

body{
font-family:Arial;
background:#f2f6ff;
text-align:center;
margin:0;
}

header{
background:#2c3e50;
color:white;
padding:15px;
font-size:22px;
}

form{
background:white;
padding:20px;
margin:20px auto;
width:90%;
max-width:500px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
padding:10px;
margin:5px;
width:90%;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px 20px;
background:#3498db;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#2980b9;
}

table{
width:95%;
margin:auto;
margin-top:20px;
border-collapse:collapse;
background:white;
}

th{
background:#3498db;
color:white;
padding:10px;
}

td{
border:1px solid #ddd;
padding:10px;
}

tr:nth-child(even){
background:#f2f2f2;
}

.logout{
background:#e74c3c;
margin:20px;
}

</style>

</head>

<body>

<header>
Suryapanti Pharma Store - Patient Dashboard
</header>

<h2>Add Patient</h2>

<form id="patientForm">

<input type="text" id="name" placeholder="Patient Name" required>

<input type="number" id="age" placeholder="Age" required>

<button type="submit">Add Patient</button>

</form>

<h2>Patient List</h2>

<table>

<thead>

<tr>
<th>UID</th>
<th>Name</th>
<th>Age</th>
<th>Date</th>
<th>Time</th>
</tr>

</thead>

<tbody id="patientList"></tbody>

</table>

<button class="logout" onclick="logout()">Logout</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
getAuth,
signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyDpV_nRiRt2cToNGaFW1bi55hsb-7p6Ig8",
authDomain: "suryapanti-pharma-store.firebaseapp.com",
projectId: "suryapanti-pharma-store",
storageBucket: "suryapanti-pharma-store.firebasestorage.app",
messagingSenderId: "960716528234",
appId: "1:960716528234:web:0d1968b04794a49bbb8813"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

let uidCounter = 1;

document.getElementById("patientForm").addEventListener("submit", async(e)=>{

e.preventDefault();

let name=document.getElementById("name").value;
let age=document.getElementById("age").value;

let now=new Date();

let date=now.toLocaleDateString();
let time=now.toLocaleTimeString();

let uid="P"+uidCounter++;

await addDoc(collection(db,"patients"),{

uid:uid,
name:name,
age:age,
date:date,
time:time,
created:serverTimestamp()

});

document.getElementById("patientForm").reset();

loadPatients();

});

async function loadPatients(){

let table=document.getElementById("patientList");

table.innerHTML="";

let querySnapshot=await getDocs(collection(db,"patients"));

querySnapshot.forEach((doc)=>{

let data=doc.data();

table.innerHTML+=`

<tr>
<td>${data.uid}</td>
<td>${data.name}</td>
<td>${data.age}</td>
<td>${data.date}</td>
<td>${data.time}</td>
</tr>

`;

});

}

loadPatients();

window.logout=function(){

signOut(auth).then(()=>{

window.location.href="index.html";

});

}

</script>

</body>
</html>
