<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body{
font-family: Arial;
background:white;
text-align:center;
}

h1{
margin-top:20px;
}

form{
margin:20px;
}

input{
padding:10px;
margin:5px;
}

button{
padding:10px 20px;
cursor:pointer;
}

table{
margin:auto;
margin-top:20px;
border-collapse:collapse;
width:80%;
}

th,td{
border:1px solid black;
padding:10px;
}

</style>

</head>

<body>

<h1>Admin Dashboard</h1>

<h2>Add Patient</h2>

<form id="patientForm">

<input type="text" id="name" placeholder="Patient Name" required>

<input type="number" id="age" placeholder="Age" required>

<button type="submit">Add Patient</button>

</form>

<h2>Patient List</h2>

<table>

<thead>

<tr>

<th>UID</th>
<th>Name</th>
<th>Age</th>
<th>Date</th>
<th>Time</th>

</tr>

</thead>

<tbody id="patientList"></tbody>

</table>

<br>

<button onclick="logout()">Logout</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { 
getFirestore,
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
getAuth,
signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";


const firebaseConfig = {

apiKey: "YOUR_API_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_PROJECT_ID",
storageBucket: "YOUR_BUCKET",
messagingSenderId: "YOUR_ID",
appId: "YOUR_APP_ID"

};


const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);


let uidCounter = 1;


document.getElementById("patientForm").addEventListener("submit", async(e)=>{

e.preventDefault();

let name=document.getElementById("name").value;

let age=document.getElementById("age").value;

let now=new Date();

let date=now.toLocaleDateString();

let time=now.toLocaleTimeString();

let uid="P"+uidCounter++;

await addDoc(collection(db,"patients"),{

uid:uid,
name:name,
age:age,
date:date,
time:time

});

document.getElementById("patientForm").reset();

loadPatients();

});


async function loadPatients(){

let table=document.getElementById("patientList");

table.innerHTML="";

let querySnapshot=await getDocs(collection(db,"patients"));

querySnapshot.forEach((doc)=>{

let data=doc.data();

table.innerHTML+=`

<tr>

<td>${data.uid}</td>
<td>${data.name}</td>
<td>${data.age}</td>
<td>${data.date}</td>
<td>${data.time}</td>

</tr>

`;

});

}

loadPatients();


window.logout=function(){

signOut(auth).then(()=>{

window.location.href="index.html";

});

}

</script>

</body>
</html>
